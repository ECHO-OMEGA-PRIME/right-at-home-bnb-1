<?xml version="1.0" encoding="UTF-8"?>
<!--
  RAH Logo (White on Maroon) - Right At Home BnB
  Texas A&M Aggies Colors: Maroon #500000 + White #FFFFFF
  Baseball-style italic lettering
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120" width="300" height="120">
  <defs>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Maroon Background -->
  <rect width="300" height="120" fill="#500000" rx="12"/>

  <!-- RAH Text - White on Maroon -->
  <text
    x="150"
    y="75"
    text-anchor="middle"
    font-family="Impact, 'Arial Black', Helvetica, sans-serif"
    font-size="72"
    font-weight="900"
    font-style="italic"
    fill="#FFFFFF"
    filter="url(#shadow)"
    letter-spacing="6"
  >RAH</text>

  <!-- Baseball-style swoosh underline -->
  <path
    d="M 40 90 Q 150 110 260 90"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="5"
    stroke-linecap="round"
  />

  <!-- Subtitle: RIGHT AT HOME -->
  <text
    x="150"
    y="115"
    text-anchor="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="14"
    font-weight="700"
    fill="#FFFFFF"
    letter-spacing="4"
  >RIGHT AT HOME</text>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<!--
  RAH App Icon - Right At Home BnB
  Texas A&M Aggies: Maroon #500000 + White
  Square format for app icons
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gradient for depth -->
    <linearGradient id="maroonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#722F37"/>
      <stop offset="50%" style="stop-color:#500000"/>
      <stop offset="100%" style="stop-color:#3D0000"/>
    </linearGradient>
    <!-- Shadow -->
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" fill="url(#maroonGrad)" rx="100"/>

  <!-- RAH Text - Centered -->
  <text
    x="256"
    y="310"
    text-anchor="middle"
    font-family="Impact, 'Arial Black', Helvetica, sans-serif"
    font-size="180"
    font-weight="900"
    font-style="italic"
    fill="#FFFFFF"
    filter="url(#textShadow)"
    letter-spacing="8"
  >RAH</text>

  <!-- Swoosh underline -->
  <path
    d="M 80 360 Q 256 420 432 360"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="12"
    stroke-linecap="round"
    opacity="0.9"
  />
</svg>

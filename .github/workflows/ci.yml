name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: cd ../.. && pnpm install --frozen-lockfile

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build
        run: pnpm build
        env:
          SKIP_PRISMA: true

      - name: Health check
        if: github.ref == 'refs/heads/main'
        run: |
          curl -sf https://rah-midland.com/api/health || echo "Health check skipped (deploy pending)"

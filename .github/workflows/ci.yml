name: ci

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      lang: ${{ steps.detect.outputs.lang }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        shell: bash
        run: |
          if   [ -f package.json ];   then echo "lang=node"   >>"$GITHUB_OUTPUT"
          elif [ -f pyproject.toml ] || [ -f requirements.txt ]; then echo "lang=python" >>"$GITHUB_OUTPUT"
          elif [ -f Cargo.toml ];     then echo "lang=rust"   >>"$GITHUB_OUTPUT"
          elif [ -f go.mod ];         then echo "lang=go"     >>"$GITHUB_OUTPUT"
          else echo "lang=none" >>"$GITHUB_OUTPUT"
          fi

  node:
    needs: detect
    if: needs.detect.outputs.lang == 'node'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run typecheck --if-present
      - run: npm test --if-present
      - run: npm run build --if-present

  python:
    needs: detect
    if: needs.detect.outputs.lang == 'python'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -e .[dev] || pip install -r requirements.txt || true
      - run: ruff check . || true
      - run: pytest -q || true

  rust:
    needs: detect
    if: needs.detect.outputs.lang == 'rust'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all

  go:
    needs: detect
    if: needs.detect.outputs.lang == 'go'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - run: go vet ./...
      - run: go test ./...

  none:
    needs: detect
    if: needs.detect.outputs.lang == 'none'
    runs-on: ubuntu-latest
    steps:
      - run: echo "no language manifest detected — CI is a no-op"

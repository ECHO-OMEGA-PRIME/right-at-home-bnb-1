name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy to Vercel even without a recent push (requires VERCEL_TOKEN secret)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: cd ../.. && pnpm install --frozen-lockfile

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build
        run: pnpm build
        env:
          SKIP_PRISMA: true

      - name: Deploy to Vercel (production)
        if: (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && env.VERCEL_TOKEN != ''
        working-directory: ../..
        run: |
          npm install -g vercel@latest --silent
          vercel deploy --prod --yes --token=$VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Health check
        if: github.ref == 'refs/heads/main'
        run: |
          sleep 10
          curl -sf https://rah-midland.com/api/health || echo "Health check skipped (deploy pending)"
